{% extends "base.html" %}

{% block title %}Update Task{% endblock %}

{% block content %}

<h1>Update Task</h1>

<p style="margin-top: 10px; color: #555;">
    Edit the details of your task below.
</p>

<form method="post" action="{% url 'update-task' workspace_id=workspace.id task_id=task.id %}" style="max-width: 500px; margin-top: 20px;">
    {% csrf_token %}


<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Task</label>
    <input type="text" name="task" value="{{ task.task }}" required
           style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
</div>

<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Description</label>
    <input type="text" name="description" value="{{ task.description }}"
           style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
</div>

<div style="margin-bottom: 20px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Status</label>
    <select name="status"
            style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        <option value="pending" {% if task.status == "pending" %}selected{% endif %}>Pending</option>
        <option value="completed" {% if task.status == "completed" %}selected{% endif %}>Completed</option>
    </select>
</div>

<div style="display: flex; gap: 10px;">

    <a href="{% url 'task' workspace.id %}"
       style="text-decoration: none; padding: 10px 16px; border-radius: 6px; background: #bdc3c7; color: #333; font-weight: bold;">
        Cancel
    </a>

    <button type="submit"
            style="background-color: #4CAF50; color: white; padding: 10px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
        Update
    </button>

</div>


</form>

{% endblock %}
