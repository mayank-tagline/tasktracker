<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task</title>
</head>
<body>
    <h1>this is task page with templates. </h1>
    <br>
    <a href="/task/add">add new task</a>
    <br>
    {% for t in task %}
    <h4>{{ t.task }}</h4>
    <ul>
        <li>{{ t.description }}</li>
        <li>{{ t.status }}</li>
    </ul>
    {% endfor %}
</body>
</html>
