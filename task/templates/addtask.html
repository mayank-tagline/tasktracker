{% extends "base.html" %}

{% block title %}Add Task{% endblock %}

{% block content %}

<h1>Add New Task</h1>

<form method="post" action="{% url 'add-task' workspace_id=workspace.id %}" style="max-width: 500px; margin-top: 20px;">
    {% csrf_token %}


<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Task</label>
    <input type="text" name="task" placeholder="Enter task title" required
           style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
</div>

<div style="margin-bottom: 15px;">
    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Description</label>
    <input type="text" name="description" placeholder="Enter description"
           style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
</div>

<button type="submit"
        style="background-color: #4CAF50; color: white; padding: 10px 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
    Create Task
</button>


</form>

{% endblock %}
