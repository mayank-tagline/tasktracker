{% extends "base.html" %}

{% block title %}New Task | TaskTracker{% endblock %}

{% block content %}
<style>
    .form-card {
        max-width: 600px;
        margin: 0 auto;
        background: var(--white);
        padding: 40px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
    }

    .form-header {
        margin-bottom: 30px;
        text-align: center;
    }

    .form-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-main);
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        color: var(--text-main);
        margin-bottom: 8px;
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        outline: none;
        transition: all 0.2s;
        font-size: 15px;
        font-family: inherit;
    }

    .form-group input:focus, .form-group textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-group textarea {
        min-height: 120px;
        resize: vertical;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 30px;
    }

    .btn-submit {
        flex: 1;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-submit:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .btn-cancel {
        flex: 1;
        padding: 12px;
        background: var(--bg-main);
        color: var(--text-muted);
        text-align: center;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.2s;
    }

    .btn-cancel:hover {
        background: #e2e8f0;
        color: var(--text-main);
    }
</style>

<div class="form-card">
    <div class="form-header">
        <h1>Create New Task</h1>
        <p style="color: var(--text-muted); margin-top: 8px;">Adding to <strong>{{ workspace.name }}</strong></p>
    </div>

    <form method="post" action="{% url 'add-task' workspace_id=workspace.id %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="task">Task Title</label>
            <input type="text" id="task" name="task" placeholder="e.g. Design new landing page" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Provide more details about this task..."></textarea>
        </div>

        <div class="form-actions">
            <a href="{% url 'task' workspace_id=workspace.id %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-submit">Create Task</button>
        </div>
    </form>
</div>

{% endblock %}
