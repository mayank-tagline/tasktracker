<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>


<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 380px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        color: #555;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        outline: none;
    }

    input:focus, select:focus {
        border-color: #4CAF50;
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #4CAF50;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background-color: #45a049;
    }

    .footer {
        margin-top: 15px;
        text-align: center;
    }

    .home-link {
        text-decoration: none;
        color: #3498db;
        font-weight: bold;
    }

    .home-link:hover {
        color: #2980b9;
    }
</style>


</head>

<body>
    <main class="container">
        <h1>Add New Task</h1>


    <form action="{% url 'add-task' workspace_id=workspace.id %}" method="post">
        {% csrf_token %}

        <label for="task">Task</label>
        <input type="text" id="task" name="task" placeholder="Enter task title" required>

        <label for="description">Description</label>
        <input type="text" id="description" name="description" placeholder="Enter description">



        <input type="submit" value="Create Task">
    </form>

    <div class="footer">
        <a href="{% url 'home' %}" class="home-link">← Back to Home</a>
    </div>
</main>


</body>
</html>
