{% extends "base.html" %}

{% block title %}Create Workspace{% endblock %}

{% block content %}

<h1>Create Workspace</h1>

<form method="post" action="{% url 'add-workspace' %}" style="max-width: 500px; margin-top: 20px;">
    {% csrf_token %}


    <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">
            Workspace Name
        </label>

        <input type="text" name="name" placeholder="Enter workspace name" required
            style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
    </div>

    <button type="submit"
            style="background-color: #4CAF50; color: white; padding: 10px 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        Create Workspace
    </button>


</form>

{% endblock %}
