{% extends "base.html" %}

{% block title %}Workspaces{% endblock %}

{% block content %}

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h1>Workspaces</h1>


<a href="{% url 'add-workspace' %}"
   style="text-decoration: none; background-color: #4CAF50; color: white; padding: 10px 16px; border-radius: 8px; font-weight: bold;">
    + Create Workspace
</a>


</div>

{% if workspace %} <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">


    {% for space in workspace %}
        <a href="{% url 'task' workspace_id=space.id %}" style="text-decoration: none;">

            <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.08); transition: 0.2s;">
                <h4 style="color: #333;">{{ space.name }}</h4>
            </div>

        </a>
    {% endfor %}

</div>


{% else %} <p style="text-align: center; color: #777; margin-top: 40px;">
No workspaces yet. Create one to get started. </p>
{% endif %}

{% endblock %}
