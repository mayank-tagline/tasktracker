<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>


<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 350px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    h1 span {
        color: #4CAF50;
    }

    .alert {
        background-color: #e3f2fd;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        color: #333;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        color: #555;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #4CAF50;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #4CAF50;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: #45a049;
    }

    .register {
        text-align: center;
        margin-top: 12px;
    }

    .register a {
        text-decoration: none;
        color: #3498db;
        font-weight: bold;
    }

    .register a:hover {
        color: #2980b9;
    }
</style>


</head>

<body>
    <div class="container">


    <form method="post">
        {% csrf_token %}

        <h1><span>Login</span></h1>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit" class="btn">Login</button>

        <div class="register">
            <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
        </div>

    </form>

</div>


</body>
</html>
